baseURL: "https://www.enricopesce.it/"
title: "Enrico Pesce"
theme: PaperMod
copyright: "Enrico Pesce"
enableRobotsTXT: false
locale: "en-US"
defaultContentLanguage: "en"

security:
  allowContent:
    - '^text/(markdown|html|csv|plain)$'
    - '^image/'
    - '^application/(json|x-ndjson|vnd\.openxmlformats-officedocument\.spreadsheetml\.sheet)$'

sitemap:
  changefreq: Weekly
  filename: sitemap.xml
  priority: 0.5

permalinks:
  posts: "/:slug/"

pagination:
  disableAliases: false
  pagerSize: 10
  path: page

taxonomies:
  tag: tags
  category: categories

params:
  description: "Cloud architecture notes on Oracle Cloud Infrastructure, Kubernetes, serverless systems, automation, and Generative AI."
  author: "Enrico Pesce"
  analytics:
    gtm:
      containerID: "GTM-WQ288D86"

  homeInfoParams:
    Title: "Cloud Architecture Notes"
    Content: "Practical notes on Oracle Cloud Infrastructure, Kubernetes, serverless systems, automation, and Generative AI. I write from hands-on experiments, benchmarks, and field patterns."
    AlignSocialIconsTo: "left"

  socialIcons:
    - name: "linkedin"
      title: "LinkedIn"
      url: "https://www.linkedin.com/in/enricopesce/"
    - name: "github"
      title: "GitHub"
      url: "https://github.com/enricopesce"
    - name: "rss"
      title: "RSS"
      url: "/index.xml"

  schema:
    publisherType: "Person"
    jobTitle: "Cloud Solution Engineer"
    worksFor: "Oracle"
    sameAs:
      - "https://www.linkedin.com/in/enricopesce/"
      - "https://github.com/enricopesce"
    knowsAbout:
      - "Oracle Cloud Infrastructure"
      - "Cloud Computing"
      - "Kubernetes"
      - "Serverless Architecture"
      - "DevOps"
      - "Infrastructure as Code"
      - "Terraform"
      - "Python"

  keywords:
    - "cloud solutions"
    - "oracle cloud infrastructure"
    - "oci"
    - "serverless"
    - "kubernetes"
    - "devops"
    - "cloud engineering"
    - "enrico pesce"

  defaultTheme: auto
  ShowShareButtons: true
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false
  mainSections:
    - posts
  fuseOpts:
    iscasesensitive: false
    shouldsort: true
    location: 0
    distance: 1000
    threshold: 0.35
    minmatchcharlength: 2
    keys:
      - title
      - permalink
      - summary
      - content
  editPost:
    URL: "https://github.com/enricopesce/blog/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true
  cover:
    hiddenInList: false
    hiddenInSingle: false
  assets:
    favicon: "/favicon-32x32.png"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    theme_color: "#2e2e33"
    msapplication_TileColor: "#2e2e33"
  footer:
    text: "Cloud architecture notes on OCI, Kubernetes, Serverless, and GenAI"
  env: production

outputs:
  home:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS
  taxonomy:
    - HTML
    - RSS
  term:
    - HTML
    - RSS

menu:
  main:
    - identifier: projects
      name: Projects
      url: projects/
      weight: 10
    - identifier: archives
      name: Archives
      url: archives/
      weight: 20
    - identifier: tags
      name: Tags
      url: tags/
      weight: 30
    - identifier: search
      name: Search
      url: search/
      weight: 40
    - identifier: about
      name: About
      url: about/
      weight: 50
