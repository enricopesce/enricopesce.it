baseURL: "https://www.enricopesce.it/"
title: "Enrico Pesce - OCI Cloud Specialist"
theme: PaperMod
copyright: "Enrico Pesce"
enableRobotsTXT: true
disableHugoGeneratorInject: true
locale: "en-US"
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

services:
  googleAnalytics:
    id: "G-N6VMEVB66C"

languages:
  en:
    locale: "en-US"
    label: "English"
    weight: 1
  it:
    locale: "it-IT"
    label: "Italiano"
    weight: 2
    title: "Enrico Pesce - Specialista OCI Cloud"
    params:
      description: "Enrico Pesce e' uno specialista Oracle Cloud Infrastructure che pubblica guide pratiche su OCI, OCI Generative AI, Kubernetes, serverless, automazione e benchmark cloud."
      homeInfoParams:
        Title: "Enrico Pesce, specialista Oracle Cloud Infrastructure"
        Content: "Sono **Enrico Pesce** e pubblico guide pratiche su **Oracle Cloud Infrastructure**, **OCI Generative AI**, **OKE/Kubernetes**, serverless, automazione e benchmark cloud. Il sito raccoglie esempi tecnici, benchmark e progetti open-source per chi lavora con OCI."
        AlignSocialIconsTo: "left"
      footer:
        text: "Enrico Pesce - Oracle Cloud Infrastructure, Kubernetes, Serverless, GenAI e automazione cloud"
    menu:
      main:
        - identifier: about
          name: Chi sono
          url: about/
          weight: 5
        - identifier: parliamo-oci
          name: Parliamo di OCI
          url: parliamo-di-oci/
          weight: 20
        - identifier: projects
          name: Progetti
          url: projects/
          weight: 10
        - identifier: archives
          name: Archivio
          url: archives/
          weight: 30
        - identifier: tags
          name: Tags
          url: tags/
          weight: 40
        - identifier: search
          name: Cerca
          url: search/
          weight: 50

security:
  allowContent:
    - '^text/(markdown|html|csv|plain)$'
    - '^image/'
    - '^application/(json|x-ndjson|vnd\.openxmlformats-officedocument\.spreadsheetml\.sheet)$'

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

mediaTypes:
  text/plain:
    suffixes:
      - txt

outputFormats:
  LLMS:
    mediaType: text/plain
    baseName: llms
    isPlainText: true
    notAlternative: true

permalinks:
  posts: "/:slug/"

pagination:
  disableAliases: false
  pagerSize: 10
  path: page

taxonomies:
  tag: tags
  category: categories

params:
  description: "Enrico Pesce is an Oracle Cloud Infrastructure specialist publishing practical guides on OCI, OCI Generative AI, Kubernetes, serverless architecture, automation, and cloud benchmarks."
  author: "Enrico Pesce"
  label:
    text: "Enrico Pesce"
  homeInfoParams:
    Title: "Enrico Pesce, Oracle Cloud Infrastructure specialist"
    Content: "I am **Enrico Pesce** and I publish practical guides on **Oracle Cloud Infrastructure**, **OCI Generative AI**, **OKE/Kubernetes**, serverless architecture, automation, and cloud benchmarks. This site collects technical examples, benchmarks, and open-source projects for people working with OCI."
    AlignSocialIconsTo: "left"

  socialIcons:
    - name: "linkedin"
      title: "LinkedIn"
      url: "https://www.linkedin.com/in/enricopesce/"
    - name: "github"
      title: "GitHub"
      url: "https://github.com/enricopesce"
    - name: "rss"
      title: "RSS"
      url: "/index.xml"

  schema:
    publisherType: "Person"
    name: "Enrico Pesce"
    image: "/me.webp"
    alternateName:
      - "Enrico Pesce OCI"
      - "Enrico Pesce Oracle Cloud"
    jobTitle: "Cloud Solution Engineer"
    worksFor: "Oracle"
    description: "Enrico Pesce is a Cloud Solution Engineer and Oracle Cloud Infrastructure specialist focused on OCI, Kubernetes, serverless, automation, benchmarks, and Generative AI."
    sameAs:
      - "https://www.linkedin.com/in/enricopesce/"
      - "https://github.com/enricopesce"
    knowsAbout:
      - "Oracle Cloud Infrastructure"
      - "Cloud Computing"
      - "Kubernetes"
      - "Serverless Architecture"
      - "DevOps"
      - "Infrastructure as Code"
      - "Terraform"
      - "Python"
      - "Generative AI"
    knowsLanguage:
      - "English"
      - "Italian"
    areaServed:
      - "Italy"
      - "Europe"

  keywords:
    - "oracle cloud infrastructure"
    - "oci"
    - "oci italy"
    - "oracle cloud italy"
    - "oci specialist"
    - "oci community"
    - "oci network"
    - "enrico pesce oci"
    - "enrico pesce oracle cloud"
    - "cloud specialist"
    - "cloud solutions"
    - "serverless"
    - "kubernetes"
    - "devops"
    - "cloud engineering"
    - "enrico pesce"

  defaultTheme: auto
  ShowShareButtons: true
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false
  mainSections:
    - posts
  fuseOpts:
    iscasesensitive: false
    shouldsort: true
    location: 0
    distance: 1000
    threshold: 0.35
    minmatchcharlength: 2
    keys:
      - title
      - permalink
      - summary
      - content
  editPost:
    URL: "https://github.com/enricopesce/enricopesce.it/blob/main/content"
    Text: "Suggest Changes"
    appendFilePath: true
  cover:
    hiddenInList: false
    hiddenInSingle: false
  assets:
    favicon: "/favicon-32x32.png"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    theme_color: "#2e2e33"
    msapplication_TileColor: "#2e2e33"
  footer:
    text: "Enrico Pesce - Oracle Cloud Infrastructure, Kubernetes, Serverless, GenAI, and cloud automation"
  env: production

outputs:
  home:
    - HTML
    - RSS
    - JSON
    - LLMS
  section:
    - HTML
    - RSS
  taxonomy:
    - HTML
    - RSS
  term:
    - HTML
    - RSS

menu:
  main:
    - identifier: about
      name: About
      url: about/
      weight: 5
    - identifier: parliamo-oci
      name: Talk OCI
      url: talk-oci/
      weight: 20
    - identifier: projects
      name: Projects
      url: projects/
      weight: 10
    - identifier: archives
      name: Archives
      url: archives/
      weight: 30
    - identifier: tags
      name: Tags
      url: tags/
      weight: 40
    - identifier: search
      name: Search
      url: search/
      weight: 50
