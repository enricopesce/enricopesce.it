<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Linux memory limits with systemd and cgroup v2</title><desc id="desc">Three services isolated in memory control groups</desc>
  <rect width="1200" height="630" fill="#101827"/><circle cx="1060" cy="90" r="220" fill="#a855f7" opacity=".14"/>
  <text x="72" y="105" fill="#d8b4fe" font-family="sans-serif" font-size="28" font-weight="700">LINUX RAM · PART 3</text>
  <text x="72" y="175" fill="#f8fafc" font-family="sans-serif" font-size="52" font-weight="700">Isolate every service</text>
  <text x="72" y="220" fill="#cbd5e1" font-family="sans-serif" font-size="25">systemd · cgroup v2 · predictable OOM</text>
  <g font-family="monospace" font-size="23"><rect x="90" y="300" width="300" height="180" rx="20" fill="#07111f" stroke="#a78bfa" stroke-width="4"/><text x="125" y="355" fill="#e9d5ff">app.service</text><text x="125" y="405" fill="#94a3b8">High  1500M</text><text x="125" y="445" fill="#94a3b8">Max   1800M</text><rect x="450" y="300" width="300" height="180" rx="20" fill="#07111f" stroke="#60a5fa" stroke-width="4"/><text x="485" y="355" fill="#bfdbfe">db.service</text><text x="485" y="405" fill="#94a3b8">High  4G</text><text x="485" y="445" fill="#94a3b8">Max   5G</text><rect x="810" y="300" width="300" height="180" rx="20" fill="#07111f" stroke="#4ade80" stroke-width="4"/><text x="845" y="355" fill="#bbf7d0">proxy.service</text><text x="845" y="405" fill="#94a3b8">Low   256M</text><text x="845" y="445" fill="#94a3b8">protected</text></g>
</svg>
