  <text x="72" y="105" fill="#86efac" font-family="sans-serif" font-size="28" font-weight="700">LINUX RAM · PART 2</text>
  <text x="72" y="175" fill="#f8fafc" font-family="sans-serif" font-size="52" font-weight="700">Compress cold pages</text>
  <text x="72" y="220" fill="#cbd5e1" font-family="sans-serif" font-size="25">zram · zswap · swappiness</text>
  <g fill="#60a5fa"><rect x="95" y="300" width="110" height="70" rx="10"/><rect x="225" y="300" width="110" height="70" rx="10"/><rect x="355" y="300" width="110" height="70" rx="10"/><rect x="485" y="300" width="110" height="70" rx="10"/></g>
