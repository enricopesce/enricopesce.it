  <text x="865" y="345" fill="#86efac" font-family="monospace" font-size="32" font-weight="700">zram0</text>
  <rect x="850" y="375" width="200" height="22" rx="11" fill="#1e293b"/><rect x="850" y="375" width="86" height="22" rx="11" fill="#4ade80"/>
  <text x="95" y="500" fill="#94a3b8" font-family="sans-serif" font-size="24">pages</text><text x="858" y="500" fill="#94a3b8" font-family="sans-serif" font-size="24">less RAM, more CPU</text>
</svg>
