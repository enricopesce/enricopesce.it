<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Record RAM prices and Linux memory measurement</title>
  <desc id="desc">A rising DRAM price chart beside a Linux memory pressure terminal</desc>
  <rect width="1200" height="630" fill="#101827"/>
  <circle cx="1050" cy="105" r="210" fill="#1f6feb" opacity=".18"/>
  <text x="72" y="105" fill="#7dd3fc" font-family="sans-serif" font-size="28" font-weight="700">LINUX RAM · PART 1</text>
  <text x="72" y="175" fill="#f8fafc" font-family="sans-serif" font-size="52" font-weight="700">Measure before buying</text>
  <text x="72" y="220" fill="#cbd5e1" font-family="sans-serif" font-size="25">DRAM contract price index and real memory pressure</text>
  <line x1="90" y1="500" x2="615" y2="500" stroke="#64748b" stroke-width="3"/>
  <line x1="90" y1="500" x2="90" y2="300" stroke="#64748b" stroke-width="3"/>
  <polyline points="110,470 250,440 390,385 525,315 595,285" fill="none" stroke="#fb7185" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="110" y="535" fill="#94a3b8" font-family="sans-serif" font-size="22">Q3 2025</text>
  <text x="490" y="535" fill="#94a3b8" font-family="sans-serif" font-size="22">Q2 2026</text>
  <text x="505" y="270" fill="#fda4af" font-family="sans-serif" font-size="34" font-weight="700">4.4–4.8×</text>
  <rect x="690" y="282" width="425" height="235" rx="18" fill="#07111f" stroke="#334155" stroke-width="3"/>
  <circle cx="725" cy="320" r="8" fill="#fb7185"/><circle cx="752" cy="320" r="8" fill="#facc15"/><circle cx="779" cy="320" r="8" fill="#4ade80"/>
  <text x="720" y="375" fill="#86efac" font-family="monospace" font-size="23">$ cat /proc/pressure/memory</text>
  <text x="720" y="420" fill="#cbd5e1" font-family="monospace" font-size="21">some avg10=0.21</text>
  <text x="720" y="458" fill="#cbd5e1" font-family="monospace" font-size="21">full avg10=0.04</text>
  <text x="720" y="493" fill="#7dd3fc" font-family="monospace" font-size="18">pressure, not just usage</text>
</svg>
