      <stop offset="0%" stop-color="#ff8a3d" />
      <stop offset="100%" stop-color="#db5d14" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#7a3d14" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
