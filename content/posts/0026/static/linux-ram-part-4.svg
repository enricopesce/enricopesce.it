<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Linux RAM optimization benchmark</title><desc id="desc">A seven-step Linux memory optimization checklist and performance chart</desc>
  <rect width="1200" height="630" fill="#101827"/><circle cx="1060" cy="95" r="220" fill="#f59e0b" opacity=".14"/>
  <text x="72" y="105" fill="#fcd34d" font-family="sans-serif" font-size="28" font-weight="700">LINUX RAM · PART 4</text>
  <text x="72" y="175" fill="#f8fafc" font-family="sans-serif" font-size="52" font-weight="700">Optimize. Verify. Decide.</text>
  <text x="72" y="220" fill="#cbd5e1" font-family="sans-serif" font-size="25">A measurable plan before the next RAM purchase</text>
  <g font-family="sans-serif" font-size="25" fill="#e2e8f0"><circle cx="115" cy="310" r="22" fill="#f59e0b"/><text x="107" y="319" fill="#101827" font-weight="700">1</text><text x="155" y="319">Baseline</text><circle cx="115" cy="375" r="22" fill="#f59e0b"/><text x="107" y="384" fill="#101827" font-weight="700">2</text><text x="155" y="384">Reduce</text><circle cx="115" cy="440" r="22" fill="#f59e0b"/><text x="107" y="449" fill="#101827" font-weight="700">3</text><text x="155" y="449">Isolate</text><circle cx="115" cy="505" r="22" fill="#f59e0b"/><text x="107" y="514" fill="#101827" font-weight="700">4</text><text x="155" y="514">Benchmark</text></g>
  <rect x="500" y="285" width="610" height="245" rx="20" fill="#07111f" stroke="#334155" stroke-width="3"/>
  <line x1="555" y1="480" x2="1060" y2="480" stroke="#64748b" stroke-width="3"/><line x1="555" y1="480" x2="555" y2="335" stroke="#64748b" stroke-width="3"/>
  <polyline points="590,380 700,400 810,425 920,445 1030,455" fill="none" stroke="#4ade80" stroke-width="10" stroke-linecap="round"/>
  <text x="590" y="510" fill="#94a3b8" font-family="sans-serif" font-size="20">before</text><text x="970" y="510" fill="#94a3b8" font-family="sans-serif" font-size="20">after</text><text x="730" y="330" fill="#86efac" font-family="sans-serif" font-size="24">memory pressure ↓</text>
</svg>
